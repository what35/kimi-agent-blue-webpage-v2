<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>dt1998 数字游乐场</title>
    <script>
      (function () {
        try {
          fetch('./version.json?_t=' + Date.now(), { cache: 'no-store' })
            .then(function (r) { return r.ok ? r.json() : null; })
            .then(function (data) {
              if (!data || !data.version) return;
              var current = new URLSearchParams(location.search).get('v');
              if (current === data.version) return;
              var url = location.pathname + '?v=' + encodeURIComponent(data.version) + location.hash;
              location.replace(url);
            })
            .catch(function () {});
        } catch (e) {}
      })();
    </script>
    <meta name="description" content="dt1998 的个人数字游乐场 - AI 工具制造者 & 数字游民" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=Kalam:wght@400;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
